<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freyer könyvtár</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <div class="logo">📚</div>
            <h1>Freyer könyvtár</h1>
            <p>Kérlek jelentkezz be a folytatáshoz.</p>
            <button id="loginBtn" class="btn btn-primary btn-large">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <path d="M10 15V6l6 6-6 6v-3"></path>
                </svg>
                Belépés Microsoft fiókkal
            </button>
        </div>
    </div>

    <div class="app-container" id="appContainer" hidden> <!-- Hidden until logged in -->
        <header class="app-header">
            <div class="logo">
                <button id="backBtn" class="btn btn-text" hidden style="margin-right: 0.5rem; padding: 0.25rem;">
                    <!-- SVG ... -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M12 19L5 12L12 5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <h1>Freyer könyvtár</h1>
            </div>

            <div class="actions">
                <!-- User Profile -->
                <div id="userProfile" class="user-profile" hidden>
                    <span id="userName">Felhasználó</span>
                    <button id="logoutBtn" class="btn btn-secondary btn-small">Kilépés</button>
                </div>

                <input type="file" id="csvInput" accept=".csv" hidden>
                <button id="importBtn" class="btn btn-secondary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="icon">
                        <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M20 21H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Importálás
                </button>
                <button id="addBtn" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="icon">
                        <path d="M12 5V19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Új hozzáadása
                </button>
                <button id="exportBtn" class="btn btn-secondary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="icon">
                        <path d="M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M7 10L12 5L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M20 21H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Exportálás
                </button>
                <button id="deleteAllBtn" class="btn btn-secondary" style="color: #EF4444; border-color: #EF4444;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="icon">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Összes törlése
                </button>
            </div>
        </header>

        <main class="main-content">
            <aside class="sidebar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Keresés...">
                </div>
                <ul id="conceptList" class="concept-list">
                    <!-- Concept items will be populated here -->
                </ul>
            </aside>

            <section id="contentPanel" class="content-panel">
                <!-- Views will be injected here: Empty State, Frayer View, or Form -->
                <div id="emptyState" class="empty-state">
                    <div class="empty-illustration">📚</div>
                    <h3>Válasszon egy fogalmat a megtekintéshez</h3>
                    <p>Vagy hozzon létre egy újat a fenti gombbal.</p>
                </div>

                <!-- Template for Frayer Model View -->
                <div id="frayerView" class="frayer-view" hidden>
                    <div class="view-header-actions"
                        style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
                        <button id="editBtn" class="btn btn-secondary"
                            style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                            Szerkesztés
                        </button>
                    </div>
                    <div class="frayer-grid">
                        <div class="frayer-cell definition">
                            <h4>Meghatározás</h4>
                            <p id="viewDefinition"></p>
                        </div>
                        <div class="frayer-cell characteristics">
                            <h4>Jellemzők</h4>
                            <p id="viewCharacteristics"></p>
                        </div>
                        <div class="frayer-center">
                            <h2 id="viewName">Concept Name</h2>
                        </div>
                        <div class="frayer-cell examples">
                            <h4>Példák</h4>
                            <p id="viewExamples"></p>
                        </div>
                        <div class="frayer-cell non-examples">
                            <h4>Ellenpéldák</h4>
                            <p id="viewNonExamples"></p>
                        </div>
                    </div>
                </div>

                <!-- Template for Edit/Create Form -->
                <div id="conceptForm" class="concept-form-container" hidden>
                    <h2>Új fogalom hozzáadása</h2>
                    <form id="form">
                        <div class="form-group">
                            <label for="nameInput">Név (Kötelező)</label>
                            <input type="text" id="nameInput" required placeholder="Pl. Négyszög">
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="defInput">Meghatározás (Kötelező)</label>
                                <textarea id="defInput" required
                                    placeholder="A fogalom pontos definíciója..."></textarea>
                            </div>
                            <div class="form-group">
                                <label for="charInput">Jellemzők (Kötelező)</label>
                                <textarea id="charInput" required placeholder="Lényegi tulajdonságok..."></textarea>
                            </div>
                            <div class="form-group">
                                <label for="exInput">Példák</label>
                                <textarea id="exInput" placeholder="Konkrét példák..."></textarea>
                            </div>
                            <div class="form-group">
                                <label for="nonExInput">Ellenpéldák</label>
                                <textarea id="nonExInput" placeholder="Ami nem tartozik ide..."></textarea>
                            </div>
                        </div>
                        <div class="form-actions" style="justify-content: space-between;">
                            <button type="button" id="deleteBtn" class="btn btn-text"
                                style="color: #EF4444; margin-right: auto;" hidden>Törlés</button>
                            <div style="display: flex; gap: 1rem;">
                                <button type="button" id="cancelBtn" class="btn btn-text">Mégse</button>
                                <button type="submit" class="btn btn-primary">Mentés</button>
                            </div>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="script.js"></script>
</body>


</html>
